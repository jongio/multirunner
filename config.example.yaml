# multirunner — parallel ephemeral GitHub Actions self-hosted runners on one host.

github:
  url: "https://github.com"      # change for GHES
  scope: "org"                   # repo | org | enterprise
  owner: "myorg"                 # org name (org) | repo owner (repo) | enterprise slug (enterprise)
  repo: "myrepo"                 # only for scope=repo

auth:
  pat: "${GITHUB_PAT}"           # ${ENV} refs are resolved from the environment (keeps secrets off disk)
  #                                scopes: admin:org (org) / repo (repo) / manage_runners:enterprise
  # GitHub App (recommended for shared/production — short-lived, not user-tied):
  # app_id: 123456
  # installation_id: 78901234
  # private_key_path: "C:/path/app.pem"

provisioning: "pool"             # pool | autoscale  (webhook = alias for autoscale)
#   pool      : keep N runners idle (zero inbound; works behind NAT) — default
#   autoscale : launch runners on demand (poll queued jobs + optional webhook)

# Autoscale tuning (provisioning: autoscale). Polling is outbound-only (NAT-safe)
# and works for scope=repo; the optional webhook needs GitHub to reach `listen`
# (public IP or a tunnel: smee.io / cloudflared / ngrok).
webhook:
  listen: ""                     # e.g. "0.0.0.0:8080" to enable the webhook receiver
  path: "/webhook"
  secret: "${GITHUB_WEBHOOK_SECRET}"   # from `connect`, or the App's webhook secret
  poll_interval_sec: 300         # queued-job poll interval (repo scope); -1 disables

# Prometheus metrics + /health (empty disables)
metrics:
  listen: ""                     # e.g. "127.0.0.1:9090" -> /metrics, /health

git_cache:
  mode: "off"                    # mirror | dotgit-cache | off  (wired for scope=repo)
  path: "D:/multirunner/gitmirror"
  max_age_days: 30               # remove mirrors unused this many days (0 => 30; <0 => never)

cache:
  enabled: true
  mode: "local-server"           # local-server (own Go v2) | off
  storage: "filesystem"          # filesystem | minio
  path: "D:/multirunner/cache"
  listen: "0.0.0.0:3000"
  # URL of this cache as seen from INSIDE runner containers (host.docker.internal
  # for Docker, host.containers.internal for Podman). Injected as ACTIONS_RESULTS_URL.
  advertise_url: "http://host.docker.internal:3000"
  # Optional private path token. Embedded cache generates one automatically and
  # injects it into runners; set this only when coordinating with an external
  # standalone cacheserver's --access-token.
  access_token: "${MULTIRUNNER_CACHE_ACCESS_TOKEN}"
  skip_token_validation: true    # path token gates access; accept opaque/missing Actions bearer
  upstream: "https://results-receiver.actions.githubusercontent.com"
  # Housekeeping: evict cache entries unused for max_age_days, and LRU-evict to
  # keep total blob size under max_size_gb (0 => unlimited). gc_interval_sec sets
  # the sweep cadence; <0 disables GC entirely.
  max_age_days: 7                # 0 => 7; <0 => never expire
  max_size_gb: 0                 # 0 => unlimited
  gc_interval_sec: 3600          # 0 => 3600; <0 => disabled

pools:
  - name: linux-pool
    os: linux
    size: 3
    runner_group_id: 1
    # image_tier picks a prebuilt flavor (pulled automatically):
    #   minimal (default) | native-build | node | dotnet | rust | go
    # or set image: to use your own. dotnet/rust already bundle Node.
    # Tip: `multirunner detect --path .` recommends flavors for a repo.
    image_tier: minimal
    labels: [self-hosted, linux, x64]
    work_folder: _work
    name_prefix: multirunner
    docker:
      # WSL2 Docker Engine over TCP, OR Podman/Docker-Desktop docker-compat pipe:
      #   npipe:////./pipe/docker_engine
      host: "tcp://127.0.0.1:2375"
      enable_dind: true
    tool_cache:
      mode: "shared-volume"
      volume: "mr-toolcache-linux"
      readonly: true
    max_consecutive_failures: 5

  # Flavor pool example: a .NET + Node image, selected from a workflow with
  #   runs-on: [self-hosted, linux, dotnet]
  - name: linux-dotnet
    os: linux
    size: 2
    image_tier: dotnet
    labels: [self-hosted, linux, dotnet]
    docker:
      host: "tcp://127.0.0.1:2375"

  # Windows runners on a LINUX host via a QEMU VM (golden Server Core image +
  # per-job copy-on-write overlay). Build the golden image first: multirunner bake.
  - name: windows-vm-pool
    os: windows
    backend: qemu                # docker (default) | qemu
    size: 2
    runner_group_id: 1
    labels: [self-hosted, windows, x64]
    qemu:
      golden: "/var/lib/multirunner/golden-servercore.qcow2"
      work_dir: "/var/lib/multirunner/vm"
      mem_mb: 4096
      cpus: 2
      accel: ""                  # "" = auto: kvm (Linux) / whpx (Windows) / hvf (macOS)
      # Toolchains baked into the golden (the VM equivalent of image_tier; qemu
      # ignores image/image_tier). Options: dotnet | node | go | buildtools.
      # Match `multirunner bake --tools ...`; changing the set forces a rebuild.
      # tools: [dotnet, node, buildtools]

  - name: windows-pool
    os: windows
    size: 2
    runner_group_id: 1
    labels: [self-hosted, windows, x64]
    work_folder: _work
    docker:
      host: "npipe:////./pipe/docker_engine_windows"
      isolation: process
      windows_dind: "off"        # off | host-pipe | hyperv
    max_consecutive_failures: 5

log:
  level: info                    # debug | info | warn | error
  format: text                   # text | json
