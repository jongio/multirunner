name: images

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # Linux runner (minimal + flavors) and cache server images (multi-arch: amd64 + arm64).
  # Flavors layer on one another, so the steps are ordered minimal -> native-build ->
  # node -> {dotnet, rust}; native-build -> go. Each layer pushes a stable :<flavor>
  # channel tag the next layer references via --build-arg PARENT.
  linux:
    runs-on: ubuntu-latest
    env:
      IMG: gerardsmit/multirunner-runner-linux
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3      # arm64 emulation
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: gerardsmit
          password: ${{ secrets.DOCKER_PAT }}

      - name: Compute tag suffix
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "suffix=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "suffix=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Minimal runner image metadata
        id: meta-runner
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMG }}
          tags: |
            type=raw,value=minimal
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=sha,enable=${{ github.ref_type != 'tag' }}

      - name: Build + push minimal runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/linux/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-runner.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build + push native-build flavor
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/linux/flavors/native-build.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: PARENT=${{ env.IMG }}:minimal
          tags: |
            ${{ env.IMG }}:native-build
            ${{ env.IMG }}:native-build-${{ steps.vars.outputs.suffix }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build + push node flavor
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/linux/flavors/node.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: PARENT=${{ env.IMG }}:native-build
          tags: |
            ${{ env.IMG }}:node
            ${{ env.IMG }}:node-${{ steps.vars.outputs.suffix }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build + push dotnet flavor
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/linux/flavors/dotnet.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: PARENT=${{ env.IMG }}:node
          tags: |
            ${{ env.IMG }}:dotnet
            ${{ env.IMG }}:dotnet-${{ steps.vars.outputs.suffix }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build + push rust flavor
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/linux/flavors/rust.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: PARENT=${{ env.IMG }}:node
          tags: |
            ${{ env.IMG }}:rust
            ${{ env.IMG }}:rust-${{ steps.vars.outputs.suffix }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build + push go flavor
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/linux/flavors/go.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: PARENT=${{ env.IMG }}:native-build
          tags: |
            ${{ env.IMG }}:go
            ${{ env.IMG }}:go-${{ steps.vars.outputs.suffix }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Cache server image metadata
        id: meta-cache
        uses: docker/metadata-action@v5
        with:
          images: gerardsmit/multirunner-cacheserver
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=sha,enable=${{ github.ref_type != 'tag' }}

      - name: Build + push cache server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/cacheserver/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-cache.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Windows runner images (amd64 only; Server 2025 / ltsc2025 process isolation).
  # minimal first, then the buildtools flavor layered on it.
  windows:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: gerardsmit
          password: ${{ secrets.DOCKER_PAT }}

      - name: Build + push windows runner images
        shell: bash
        run: |
          set -euo pipefail
          IMG=gerardsmit/multirunner-runner-windows
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            SUFFIX="${GITHUB_REF_NAME#v}"
          else
            SUFFIX="sha-$(git rev-parse --short HEAD)"
          fi

          # minimal
          docker build -f images/windows/Dockerfile -t "$IMG:minimal" -t "$IMG:minimal-$SUFFIX" .
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            docker tag "$IMG:minimal" "$IMG:$SUFFIX"
            docker tag "$IMG:minimal" "$IMG:latest"
          else
            docker tag "$IMG:minimal" "$IMG:$SUFFIX"
          fi
          docker push --all-tags "$IMG"

          # buildtools flavor (layers on minimal just pushed)
          docker build -f images/windows/flavors/buildtools.Dockerfile \
            --build-arg "PARENT=$IMG:minimal" \
            -t "$IMG:buildtools" -t "$IMG:buildtools-$SUFFIX" .
          docker push "$IMG:buildtools"
          docker push "$IMG:buildtools-$SUFFIX"
